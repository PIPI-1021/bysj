
ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    two_d_mode: true
    print_diagnostics: true
    debug: false
    # debug_out_file: /path/to/debug/file   # 如需调试请指定有效路径

    # 里程计输入
    odom0: /odom
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 10
    odom0_nodelay: true
    odom0_differential: false
    odom0_relative: true

    # IMU 输入
    imu0: /imu
    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  true, true, true,
                  false, false, false]
    imu0_queue_size: 10
    imu0_nodelay: true
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

    # 坐标系
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # 是否发布 TF
    publish_tf: true
