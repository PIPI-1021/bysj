ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    two_d_mode: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # 传感器 1: 轮式里程计 (建议仅使用速度观测)
    odom0: /odom
    odom0_config: [false, false, false, # x, y, z
                   false, false, false, # roll, pitch, yaw
                   true,  true,  false, # vx, vy, vz (主要观测项)
                   false, false, true,  # vroll, vpitch, vyaw
                   false, false, false] # ax, ay, az
    odom0_relative: false

    # 传感器 2: IMU
    imu0: /imu/data  # 必须与 xacro/launch 话题一致
    imu0_config: [false, false, false,
                  false, false, true,  # 使用绝对偏航角修正航向
                  false, false, false,
                  false, false, true,  # 使用角速度
                  false, false, false] # 暂不开启加速度积分，除非底盘颠簸剧烈
    imu0_relative: true
    
    # 差分模式：如果 imu 输出的是角速度增量，建议设为 true
    imu0_differential: false 

    # 过程噪声协方差 (Q矩阵)：如果不稳定，可以调大这些值
    # [x, y, z, roll, pitch, yaw, vx, vy, vz, vroll, vpitch, vyaw, ax, ay, az]
    process_noise_covariance: [0.05, 0.05, 0.06, 0.03, 0.03, 0.06, 0.025, 0.025, 0.04, 0.01, 0.01, 0.02, 0.01, 0.01, 0.015]
