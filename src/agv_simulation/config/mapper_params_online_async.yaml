slam_toolbox:
  ros__parameters:

    # 1. 坐标系对齐 (必须与你的 EKF 逻辑一致)
    # 你在 EKF 中设置 world_frame 为 odom，所以这里也要填 odom
    odom_frame: odom                
    map_frame: map
    base_frame: base_footprint      # 对应 EKF 中的 base_link_frame
    scan_topic: /scan

    # 2. 基础运行模式
    mode: mapping
    use_sim_time: true              # 仿真环境下必须保持开启

    # 3. 扫描匹配与变换参数
    transform_timeout: 0.2          # 必须略大于 EKF 的发布间隔 (1/30.0 ≈ 0.033s)
    tf_buffer_duration: 30.0
    stack_size_to_use: 40000000
    
    # 4. 建图精度与雷达参数
    # 建议根据你小车的雷达量程和分辨率微调
    minimum_time_interval: 0.06     # 约 15-20Hz 处理频率，建议设为 EKF 频率的一半
    max_laser_range: 12.0
    resolution: 0.05                # 5cm 分辨率是 AGV 建图的黄金标准
    
    # 5. 循环检测 (Loop Closure)
    # 这部分确保当你回到原点时，地图能自动对齐误差
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_node_search: 0.75
    
    # 6. 地图发布频率
    map_update_interval: 2.0        # 每2秒更新一次全局显示
